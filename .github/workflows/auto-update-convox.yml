name: Auto-update Convox CLI

on:
  schedule:
    - cron: "0 8 * * *" # Daily at 8 AM UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    env:
      DOCKER_REPO: beastawakens/action-convox-multi-slim
    steps:
      - name: Get latest Convox release
        id: convox
        run: |
          LATEST=$(curl -sf https://api.github.com/repos/convox/convox/releases/latest | jq -r '.tag_name')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::error::Failed to fetch latest Convox release"
            exit 1
          fi
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest Convox release: $LATEST"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if update needed
        id: check
        run: |
          CURRENT=$(cat CONVOX_VERSION 2>/dev/null | tr -d '[:space:]' || echo "none")
          LATEST="${{ steps.convox.outputs.version }}"
          echo "Current tracked version: $CURRENT"
          echo "Latest Convox version:   $LATEST"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "Already up to date."
            echo "update=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version available!"
            echo "update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.check.outputs.update == 'true'
        id: version
        run: |
          CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Current action version: $CURRENT_VERSION"

          # Strip 'v' prefix
          VERSION_NUM="${CURRENT_VERSION#v}"

          # Extract major.minor.patch (strip any pre-release suffix like -beta1)
          BASE_VERSION=$(echo "$VERSION_NUM" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
          MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
          PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)

          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "New action version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version files
        if: steps.check.outputs.update == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          CONVOX_VERSION="${{ steps.convox.outputs.version }}"

          # Update VERSION file
          echo "$NEW_VERSION" > VERSION

          # Update CONVOX_VERSION tracker
          echo "$CONVOX_VERSION" > CONVOX_VERSION

          # Update action.yml image tag
          sed -i "s|\(image:.*:\)[^'\"]*|\1${NEW_VERSION}|" action.yml

          # Update Dockerfile version label
          sed -i "s|\(LABEL version=\)\"[^\"]*\"|\1\"${NEW_VERSION}\"|" Dockerfile

          echo "Updated files for $NEW_VERSION (Convox $CONVOX_VERSION)"

      - name: Set up Docker Buildx
        if: steps.check.outputs.update == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check.outputs.update == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check.outputs.update == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKER_REPO }}:${{ steps.version.outputs.new_version }}

      - name: Commit, tag, and push
        if: steps.check.outputs.update == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          CONVOX_VERSION="${{ steps.convox.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add VERSION CONVOX_VERSION action.yml Dockerfile
          git commit -m "Auto-update Convox CLI to ${CONVOX_VERSION} (${NEW_VERSION})"
          git tag "${NEW_VERSION}" -m "Auto-update Convox CLI to ${CONVOX_VERSION}"
          git push origin main
          git push origin "refs/tags/${NEW_VERSION}"

      - name: Summary
        if: steps.check.outputs.update == 'true'
        run: |
          echo "### Convox CLI Auto-Update" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Convox version:** ${{ steps.convox.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Action version:** ${{ steps.version.outputs.new_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Docker image:** ${{ env.DOCKER_REPO }}:${{ steps.version.outputs.new_version }}" >> "$GITHUB_STEP_SUMMARY"
