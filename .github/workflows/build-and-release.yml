name: Build and Release

on:
  workflow_call:
    inputs:
      version:
        description: "New version tag (e.g. v3.1.0)"
        required: true
        type: string
      commit-message:
        description: "Commit message for the version bump"
        required: true
        type: string
      convox-version:
        description: "If set, writes this value to CONVOX_VERSION and stages it"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version files
        run: |
          VERSION="${{ inputs.version }}"
          echo "$VERSION" > VERSION
          if [ -n "${{ inputs.convox-version }}" ]; then
            echo "${{ inputs.convox-version }}" > CONVOX_VERSION
          fi

      - name: Commit version bump and tag
        run: |
          VERSION="${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          if [ -n "${{ inputs.convox-version }}" ]; then
            git add CONVOX_VERSION
          fi
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "${{ inputs.commit-message }}"
          git tag "$VERSION" -m "$VERSION"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
