name: Build and Release

on:
  workflow_call:
    inputs:
      version:
        description: "New version tag (e.g. v2.1.0)"
        required: true
        type: string
      commit-message:
        description: "Commit message for the version bump"
        required: true
        type: string
      convox-version:
        description: "If set, writes this value to CONVOX_VERSION and stages it"
        required: false
        type: string
        default: ""
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: write

env:
  DOCKER_REPO: beastawakens/action-convox-multi-slim

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version files
        run: |
          VERSION="${{ inputs.version }}"
          echo "$VERSION" > VERSION
          sed -i "s|\(image:.*:\)[^'\"]*|\1${VERSION}|" action.yml
          sed -i "s|\(LABEL version=\)\"[^\"]*\"|\1\"${VERSION}\"|" Dockerfile
          if [ -n "${{ inputs.convox-version }}" ]; then
            echo "${{ inputs.convox-version }}" > CONVOX_VERSION
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.DOCKER_REPO }}:${{ inputs.version }}
            ${{ env.DOCKER_REPO }}:latest

      - name: Commit version bump and tag
        run: |
          VERSION="${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION action.yml Dockerfile
          if [ -n "${{ inputs.convox-version }}" ]; then
            git add CONVOX_VERSION
          fi
          git commit -m "${{ inputs.commit-message }}"
          git tag "$VERSION" -m "$VERSION"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
