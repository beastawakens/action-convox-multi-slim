name: Convox Multitool
description: Convox CLI interface
author: Beast Awakens
icon: cloud
color: blue
inputs:
  action:
    description: Convox command to action
    required: true
    type: choice
    options:
      - build
      - build-migrate
      - create
      - deploy
      - destroy
      - env-set
      - find-build
      - find-release
      - get-scale
      - get-rack-param
      - login
      - login-user
      - promote
      - rack-param
      - rollback
      - run
      - scale
  password:
    description: Convox deploy key value
  host:
    description: Convox Console host address
    required: false
    default: console.convox.com
  token:
    description: Convox Console token value
  rack:
    description: Convox Rack name
  app:
    description: Convox app name
  destinationApp:
    description: Convox destination app name for build migration
  destinationRack:
    description: Convox destination rack name for build migration
  description:
    description: Convox build description
  cached:
    description: Whether to utilise the docker cache during the build
    required: false
    default: true
  external:
    description: Build the image locally and push directly to the rack registry, bypassing the load balancer upload
    required: false
    default: false
  manifest:
    description: Use a custom path for your convox.yml
    required: false
  paramName:
    description: Name of the parameter to get or set
  paramValue:
    description: Value of the parameter to set
  release:
    description: ID of the release to promote. Only needed if you have not run a build step first or you wish to override the release id from the build
    required: false
  service:
    description: The service to run the command against
  command:
    description: The command to be run
  count:
    description: The number of instances to scale to
  env:
    description: Environment variables in the form 'key1=value1 key2=value2'
outputs:
  BUILD:
    description: Build ID of the build matching the description
  RELEASE:
    description: Release ID of the created build
  DESIRED:
    description: Count of desired instances
  RUNNING:
    description: Count of running instances
  CPU:
    description: CPU scale value
  MEMORY:
    description: Memory scale value
  PARAM_VALUE:
    description: Rack parameter value
  SCALING_EVENT:
    description: Boolean value to indicate if a scaling event is in progress
  RUNNING_PROCESSES:
    description: Count of running processes for the service
  PENDING_PROCESSES:
    description: Count of pending processes for the service
  UNHEALTHY_PROCESSES:
    description: Count of unhealthy processes for the service
runs:
  using: 'composite'
  steps:
    - name: Install convox CLI
      shell: bash
      run: |
        CONVOX_VERSION=$(cat "$GITHUB_ACTION_PATH/CONVOX_VERSION")
        curl -fsSL "https://github.com/convox/convox/releases/download/v${CONVOX_VERSION}/convox-linux" -o /tmp/convox
        chmod 755 /tmp/convox
        sudo mv /tmp/convox /usr/local/bin/convox
    - name: Run convox action
      shell: bash
      run: bash "$GITHUB_ACTION_PATH/entrypoint.sh"
      env:
        INPUT_ACTION: ${{ inputs.action }}
        INPUT_PASSWORD: ${{ inputs.password }}
        INPUT_HOST: ${{ inputs.host }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_RACK: ${{ inputs.rack }}
        INPUT_APP: ${{ inputs.app }}
        INPUT_DESTINATIONAPP: ${{ inputs.destinationApp }}
        INPUT_DESTINATIONRACK: ${{ inputs.destinationRack }}
        INPUT_DESCRIPTION: ${{ inputs.description }}
        INPUT_CACHED: ${{ inputs.cached }}
        INPUT_EXTERNAL: ${{ inputs.external }}
        INPUT_MANIFEST: ${{ inputs.manifest }}
        INPUT_PARAMNAME: ${{ inputs.paramName }}
        INPUT_PARAMVALUE: ${{ inputs.paramValue }}
        INPUT_RELEASE: ${{ inputs.release }}
        INPUT_SERVICE: ${{ inputs.service }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_COUNT: ${{ inputs.count }}
        INPUT_ENV: ${{ inputs.env }}